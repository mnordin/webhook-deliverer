development:
  adapter: solid_cable
  connects_to:
    database:
      writing: primary
  polling_interval: <%= 1.second %>
  message_retention: <%= 1.day %>

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  channel_prefix: webhook_deliverer_production
